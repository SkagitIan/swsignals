<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice | SedroWoolley.us</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              cream: '#F7F4EE',
              charcoal: '#1F2A2E',
              slate: '#526067',
              teal: '#1E7A7A',
              mist: '#DCE9E7',
              sand: '#E9E1D3'
            }
          }
        }
      };
    </script>
  </head>
  <body class="bg-cream text-charcoal antialiased">
    <header class="sticky top-0 z-30 border-b border-charcoal/10 bg-cream/95 backdrop-blur">
      <nav class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
        <a href="index.html" class="text-lg font-semibold tracking-tight">SedroWoolley.us</a>
        <div class="hidden items-center gap-6 text-sm font-medium md:flex">
          <a class="nav-link text-teal" href="voice.html">Voice</a>
          <a class="nav-link" href="index.html#decisions">Decisions</a>
          <a class="nav-link" href="index.html#maps">Maps</a>
          <a class="nav-link" href="index.html#agenda">Agenda</a>
        </div>
        <a href="index.html#subscribe" class="interactive-btn rounded-full bg-charcoal px-4 py-2 text-sm font-semibold text-cream">Subscribe</a>
      </nav>
    </header>

    <main class="mx-auto max-w-4xl px-4 py-14 sm:px-6 lg:px-8 lg:py-20">
      <section class="mb-8">
        <p class="mb-3 text-sm font-semibold uppercase tracking-[0.16em] text-teal">This week’s voice</p>
        <h1 class="text-4xl font-semibold tracking-tight sm:text-5xl">Weekly Community Survey</h1>
        <p class="mt-4 max-w-2xl text-slate">One focused question each week. Built to capture local perspective in plain language.</p>
      </section>

      <section id="voice-survey-card" class="reveal rounded-3xl border border-charcoal/10 bg-white/70 p-7 shadow-[0_20px_50px_-30px_rgba(31,42,46,0.4)] sm:p-10">
        <p class="text-xs font-semibold uppercase tracking-[0.14em] text-slate">Week of May 6</p>
        <h2 class="mt-3 text-2xl font-semibold tracking-tight sm:text-3xl">Should the city prioritize protected bike connections between schools and downtown?</h2>

        <form id="voice-form" class="mt-7 space-y-3">
          <label class="option-row flex cursor-pointer items-center justify-between rounded-2xl border border-charcoal/15 bg-cream px-4 py-3 transition hover:border-teal/50">
            <span class="font-medium">Yes</span>
            <input type="radio" name="voice" value="Yes" class="h-4 w-4 accent-teal" />
          </label>
          <label class="option-row flex cursor-pointer items-center justify-between rounded-2xl border border-charcoal/15 bg-cream px-4 py-3 transition hover:border-teal/50">
            <span class="font-medium">Maybe / Needs more detail</span>
            <input type="radio" name="voice" value="Maybe" class="h-4 w-4 accent-teal" />
          </label>
          <label class="option-row flex cursor-pointer items-center justify-between rounded-2xl border border-charcoal/15 bg-cream px-4 py-3 transition hover:border-teal/50">
            <span class="font-medium">No</span>
            <input type="radio" name="voice" value="No" class="h-4 w-4 accent-teal" />
          </label>

          <button id="submit-voice" type="submit" class="interactive-btn mt-4 rounded-full bg-teal px-6 py-3 text-sm font-semibold text-white transition hover:-translate-y-0.5">
            Submit response
          </button>
        </form>

        <p id="voice-message" class="mt-4 hidden rounded-xl border border-teal/20 bg-mist px-4 py-3 text-sm text-charcoal"></p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
      integrity="sha256-CxLNt4NsMprRjM4m6CQQfghYvM0TQ6w8bNN8feg8Z2Q="
      crossorigin="anonymous"
    ></script>
    <script src="app.js"></script>
  </body>
</html>
